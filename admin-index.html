<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – BPS Kota Parepare</title>
  <link rel="stylesheet" href="src/styles/global.css" />
  <link rel="stylesheet" href="src/styles/login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>
<body>

  <!-- Loading splash — ditampilkan selama boot() berjalan -->
  <div id="boot-splash" style="
    position:fixed;inset:0;
    background:#0b1e42;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:16px;
    z-index:9999;
  ">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect width="48" height="48" rx="14" fill="#1a3a6b"/>
      <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
            font-family="Inter,sans-serif" font-size="18" font-weight="800"
            fill="#FFD966">BPS</text>
    </svg>
    <div style="
      width:28px;height:28px;
      border:3px solid rgba(255,255,255,0.2);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .7s linear infinite;
    "></div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>

  <div id="app"></div>

  <!-- ① Supabase JS SDK v2 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

  <!-- ② Init Supabase client -->
  <script>
    window._supabase = supabase.createClient(
      'https://fufjaptmggulmzjrefvg.supabase.co',
      'sb_publishable_KpToL4zDIleZviiLL6hnvA_RXs3la0l'
    );
  </script>

  <!-- ③ Services -->
  <script src="src/services/storageService.js"></script>
  <script src="src/services/supabaseService.js"></script>
  <script src="src/services/authService.js"></script>
  <script src="src/services/adminService.js"></script>
  <script src="src/services/queueAdminService.js"></script>
  <script src="src/services/statsService.js"></script>

  <!-- ④ Features -->
  <script src="src/features/admin/loginPage.js"></script>
  <script src="src/features/admin/queuePage.js"></script>
  <script src="src/features/admin/statsPage.js"></script>
  <script src="src/features/admin/dashboardPage.js"></script>

  <!-- ⑤ Router -->
  <script src="src/router.js"></script>

  <!-- ⑥ Bootstrap — jalankan SEBELUM Router.init() -->
  <script>
    (async () => {
      // Daftarkan route dulu (belum dijalankan)
      Router.on('/admin/login',     (err) => LoginPage.render(err));
      Router.on('/admin/dashboard', ()    => DashboardPage.render());
      // Route default sama dengan login
      Router.on('/', (err) => LoginPage.render(err));

      // Jalankan auth gate
      const { route, error } = await AuthService.boot();

      // Sembunyikan splash
      document.getElementById('boot-splash').style.display = 'none';

      // Override resolve agar bisa kirim error ke LoginPage
      if (route === '/admin/login') {
        LoginPage.render(error);
        // Tetap init router supaya hashchange bekerja setelah ini
        Router.init();
      } else {
        // Langsung ke dashboard, baru init router untuk navigasi selanjutnya
        DashboardPage.render();
        Router.init();
      }
    })();
  </script>

</body>
</html>
